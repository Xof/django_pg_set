name: Test Matrix

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pg_version: ["14", "15", "16", "17", "18"]
        django_version: ["4.2", "5.2", "6.0"]
        backend: ["psycopg2", "psycopg3"]

    name: PG ${{ matrix.pg_version }} / Django ${{ matrix.django_version }} / ${{ matrix.backend }}

    services:
      postgres:
        image: postgres:${{ matrix.pg_version }}
        env:
          POSTGRES_DB: pg_set_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=2s
          --health-timeout=5s
          --health-retries=10
        ports:
          - 5432:5432

    env:
      POSTGRES_DB: pg_set_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install base dependencies
        run: uv sync

      - name: Install Django ${{ matrix.django_version }}
        env:
          DJANGO_VERSION: ${{ matrix.django_version }}
        run: uv pip install "django==${DJANGO_VERSION}.*"

      - name: Install ${{ matrix.backend }}
        env:
          BACKEND: ${{ matrix.backend }}
        run: |
          if [ "$BACKEND" = "psycopg2" ]; then
            uv pip install psycopg2-binary
            uv pip uninstall psycopg psycopg-binary 2>/dev/null || true
          else
            uv pip install "psycopg[binary]"
            uv pip uninstall psycopg2-binary 2>/dev/null || true
          fi

      - name: Run tests
        run: uv run pytest -v
