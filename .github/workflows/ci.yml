name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv sync
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: uv build
      - run: ls -la dist/

  test-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python: "3.10"
            django: "4.2"
            postgres: "14"
            psycopg: "psycopg2-binary"
          - python: "3.13"
            django: "6.0"
            postgres: "18"
            psycopg: "psycopg[binary]"
          - python: "3.10"
            django: "6.0"
            postgres: "18"
            psycopg: "psycopg[binary]"
          - python: "3.13"
            django: "4.2"
            postgres: "14"
            psycopg: "psycopg2-binary"
          - python: "3.11"
            django: "5.2"
            postgres: "15"
            psycopg: "psycopg[binary]"
          - python: "3.12"
            django: "5.2"
            postgres: "16"
            psycopg: "psycopg2-binary"
          - python: "3.11"
            django: "4.2"
            postgres: "17"
            psycopg: "psycopg[binary]"
          - python: "3.12"
            django: "6.0"
            postgres: "15"
            psycopg: "psycopg2-binary"

    name: "PR: py${{ matrix.python }} dj${{ matrix.django }} pg${{ matrix.postgres }} ${{ matrix.psycopg }}"

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pg_set_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync
      - name: Install Django and psycopg
        run: |
          uv pip install "django~=${{ matrix.django }}.0" "${{ matrix.psycopg }}"
          if [ "${{ matrix.psycopg }}" = "psycopg2-binary" ]; then
            uv pip uninstall psycopg psycopg-binary 2>/dev/null || true
          else
            uv pip uninstall psycopg2-binary 2>/dev/null || true
          fi
      - run: uv run pytest -v
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pg_set_test

  test-full:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        django: ["4.2", "5.2", "6.0"]
        postgres: ["14", "15", "16", "17", "18"]
        psycopg: ["psycopg2-binary", "psycopg[binary]"]

    name: "py${{ matrix.python }} dj${{ matrix.django }} pg${{ matrix.postgres }} ${{ matrix.psycopg }}"

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pg_set_test
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync
      - name: Install Django and psycopg
        run: |
          uv pip install "django~=${{ matrix.django }}.0" "${{ matrix.psycopg }}"
          if [ "${{ matrix.psycopg }}" = "psycopg2-binary" ]; then
            uv pip uninstall psycopg psycopg-binary 2>/dev/null || true
          else
            uv pip uninstall psycopg2-binary 2>/dev/null || true
          fi
      - run: uv run pytest -v
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pg_set_test
